name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      
      # Using the official action is faster and doesn't require go.sum
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      
      # Gosec scans your logic (AST), it won't care about a missing go.sum
      - name: Security Scan (Gosec)
        uses: securego/gosec@master
        with:
          args: ./...
      
      # Using the official action avoids the "go run" requirement for go.sum
      - name: Vulnerability Check
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...